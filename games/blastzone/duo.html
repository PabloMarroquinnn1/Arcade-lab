<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Blastzone Versus | Arcade Lab</title>
  <link rel="stylesheet" href="style.css?v=1">
</head>
<body>
  <div id="app">
    <header id="hud">
      <div class="hud-left">
        <a href="/" class="badge back-link">&#8592; Arcade</a>
        <a href="index.html" class="badge back-link">Cambiar modo</a>
      </div>
      <div class="hud-center">
        <span id="role-badge" class="badge">Conectando...</span>
      </div>
      <div class="hud-right">
        <span id="status-p1" class="score-tag p1">P1</span>
        <span id="status-p2" class="score-tag p2">P2</span>
      </div>
    </header>

    <main id="stage">
      <canvas id="gameCanvas"></canvas>
    </main>

    <footer id="controls">
      <span>P1: <kbd>WASD</kbd> &middot; P2: <kbd>&#8593;&#8592;&#8595;&#8594;</kbd> &middot; Bomba: <kbd>Space</kbd></span>
      <span id="spectators"></span>
    </footer>
  </div>

  <script src="/socket.io/socket.io.js"></script>
  <script src="duo.js?v=1"></script>
</body>
</html>
