<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Blastzone Solo | Arcade Lab</title>
  <link rel="stylesheet" href="style.css?v=1">
</head>
<body>
  <div id="app">
    <header id="hud">
      <div class="hud-left">
        <a href="/" class="badge back-link">&#8592; Arcade</a>
        <a href="index.html" class="badge back-link">Cambiar modo</a>
      </div>
      <div class="hud-center">
        <span class="score-tag timer">&#9201;&#65039; <span id="timer">0</span>s</span>
      </div>
      <div class="hud-right">
        <span class="score-tag best">Mejor tiempo <span id="bestTime">--</span></span>
      </div>
    </header>

    <main id="stage">
      <canvas id="gameCanvas"></canvas>
    </main>

    <footer id="controls">
      <span>Mover: <kbd>WASD</kbd> o flechas &middot; Bomba: <kbd>Space</kbd> &middot; Encontrá la salida escondida antes de que se acabe el tiempo</span>
    </footer>
  </div>

  <script src="solo.js?v=1"></script>
</body>
</html>
