<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Buscaminas Solo | Arcade Lab</title>
  <link rel="stylesheet" href="style.css?v=1">
</head>
<body>
  <div id="app">
    <header id="hud">
      <div class="hud-left">
        <a href="/" class="badge back-link">&#8592; Arcade</a>
        <a href="index.html" class="badge back-link">Cambiar modo</a>
      </div>
      <div class="hud-center">
        <span class="score-tag mines">&#128163; <span id="minesLeft">0</span></span>
        <span class="score-tag timer">&#9201;&#65039; <span id="timer">0</span>s</span>
      </div>
      <div class="hud-right">
        <span class="score-tag best">Mejor tiempo <span id="bestTime">--</span></span>
      </div>
    </header>

    <main id="stage">
      <div class="board-wrap">
        <div id="board" class="board"></div>
      </div>
    </main>

    <footer id="controls">
      <span>Clic: destapar &middot; Clic derecho: bandera</span>
      <button id="flagModeBtn" class="flag-mode-btn" type="button">&#128681; Modo bandera (para táctil)</button>
    </footer>
  </div>

  <div id="overlay" class="overlay-message">
    <div class="overlay-card">
      <div id="overlayTitle" class="overlay-title"></div>
      <div id="overlaySub" class="overlay-sub">Toca en cualquier lado para jugar de nuevo</div>
    </div>
  </div>

  <script src="solo.js?v=1"></script>
</body>
</html>
